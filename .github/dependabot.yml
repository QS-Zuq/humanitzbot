version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Taipei
    open-pull-requests-limit: 5
    groups:
      npm-patch-and-minor:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Taipei
    open-pull-requests-limit: 5
